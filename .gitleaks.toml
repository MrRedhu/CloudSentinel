# Extend gitleaks' default ruleset; allowlist only known-safe example values so
# the scanner never fires on documentation/test placeholders while still
# catching real secrets everywhere (including under tests/).
[extend]
useDefault = true

[allowlist]
description = "Known-safe AWS example identifiers (AWS docs/test placeholders containing EXAMPLE)."
regexes = [
  # Any AWS unique-id-shaped value that contains the EXAMPLE placeholder
  # (e.g. AKIAIOSFODNN7EXAMPLE, AROAEXAMPLEPRINCIPAL). Real keys never contain it.
  '''(AKIA|AROA|ASIA|AIDA|AGPA|AIPA|ANPA|ANVA|A3T)[A-Z0-9]*EXAMPLE[A-Z0-9]*''',
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',
]
