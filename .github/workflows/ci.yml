name: CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    name: Lint + Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Match the Lambda runtime, not the local dev version.
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Create placeholder Lambda layer artifact
        # layer.tf's filebase64sha256 reads build/layer.zip at validate time;
        # the real layer is built before `apply`, so stub it here for validate.
        run: mkdir -p build && touch build/layer.zip
      - name: Format check
        run: terraform -chdir=terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform -chdir=terraform init -backend=false
      - name: Validate
        run: terraform -chdir=terraform validate
